<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kontak - SI-HMI Pekanbaru</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: "#00450d", "primary-container": "#1b5e20", tertiary: "#705d00", surface: "#f9f9f9", "surface-low": "#f3f3f3", charcoal: "#5f5e5e" },
          fontFamily: { display: ["Newsreader"], body: ["Inter"] }
        }
      }
    };
  </script>
</head>
<body class="bg-surface text-charcoal font-body">
  <nav class="fixed top-0 z-50 w-full bg-white/80 backdrop-blur-xl">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between px-8">
      <a href="../home_page/code.html" class="font-display text-2xl font-semibold text-primary">SI-HMI Pekanbaru</a>
      <a href="../registration_forms_directory/code.html" class="rounded-xl bg-gradient-to-br from-primary to-primary-container px-5 py-3 text-xs font-semibold uppercase tracking-widest text-white">Pendaftaran</a>
    </div>
  </nav>

  <main class="mx-auto grid max-w-7xl gap-12 px-8 pb-24 pt-36 md:grid-cols-[38.2%_61.8%]">
    <aside>
      <p class="mb-4 text-xs font-semibold uppercase tracking-[0.2em] text-tertiary">POST /api/v1/contact-messages/</p>
      <h1 class="font-display text-5xl leading-tight text-primary md:text-6xl">Ruang Dialog Publik</h1>
      <p class="mt-8 text-lg leading-8">Kirim pesan, tawaran kerja sama, atau pertanyaan publik kepada HMI Cabang Pekanbaru.</p>
      <div class="mt-10 rounded-xl bg-surface-low p-6">
        <p class="text-xs font-semibold uppercase tracking-widest text-primary">Field API</p>
        <p class="mt-4 text-sm leading-7"><code>sender_name</code>, <code>sender_email</code>, <code>sender_phone</code>, <code>subject</code>, <code>message</code></p>
      </div>
    </aside>

    <section class="rounded-xl bg-white p-8 shadow-[0_12px_32px_-4px_rgba(26,28,28,0.06)]">
      <form class="space-y-7" data-api="POST /api/v1/contact-messages/">
        <div>
          <label for="sender_name" class="text-xs font-semibold uppercase tracking-widest text-primary">Nama Pengirim</label>
          <input id="sender_name" name="sender_name" type="text" class="mt-2 w-full rounded-xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary" placeholder="Nama lengkap" />
        </div>
        <div class="grid gap-6 md:grid-cols-2">
          <div>
            <label for="sender_email" class="text-xs font-semibold uppercase tracking-widest text-primary">Email</label>
            <input id="sender_email" name="sender_email" type="email" class="mt-2 w-full rounded-xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary" placeholder="email@contoh.com" />
          </div>
          <div>
            <label for="sender_phone" class="text-xs font-semibold uppercase tracking-widest text-primary">Nomor HP</label>
            <input id="sender_phone" name="sender_phone" type="tel" class="mt-2 w-full rounded-xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary" placeholder="0812..." />
          </div>
        </div>
        <div>
          <label for="subject" class="text-xs font-semibold uppercase tracking-widest text-primary">Subjek</label>
          <input id="subject" name="subject" type="text" class="mt-2 w-full rounded-xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary" placeholder="Topik pesan" />
        </div>
        <div>
          <label for="message" class="text-xs font-semibold uppercase tracking-widest text-primary">Pesan</label>
          <textarea id="message" name="message" rows="7" class="mt-2 w-full rounded-xl border-0 bg-surface-low px-4 py-4 focus:ring-2 focus:ring-primary" placeholder="Tulis pesan..."></textarea>
        </div>
        <button type="submit" class="rounded-xl bg-gradient-to-br from-primary to-primary-container px-8 py-4 text-xs font-semibold uppercase tracking-widest text-white">Kirim Pesan</button>
      </form>
    </section>
  </main>
</body>
</html>
